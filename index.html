<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Jugador - Padel App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00D4AA;
            --primary-dark: #00B894;
            --secondary: #2D3436;
            --accent: #FD79A8;
            --background: #F8F9FA;
            --card-bg: #FFFFFF;
            --text-primary: #2D3436;
            --text-secondary: #636E72;
            --success: #00B894;
            --warning: #FDCB6E;
            --danger: #E74C3C;
            --border: #E9ECEF;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background: var(--card-bg);
            min-height: 100vh;
            box-shadow: var(--shadow-lg);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-3px);
        }

        .header-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Profile Section */
        .profile-section {
            text-align: center;
            padding: 0 20px 30px;
            margin-top: -60px;
            position: relative;
            z-index: 1;
        }

        .profile-image-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            background: var(--card-bg);
        }

        .profile-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .player-level {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .player-ranking {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Stats Cards */
        .stats-section {
            padding: 20px;
        }

        .stats-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px 15px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-icon.winners {
            background: rgba(0, 212, 170, 0.1);
            color: var(--primary);
        }

        .stat-icon.errors {
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger);
        }

        .stat-icon.mvp {
            background: rgba(253, 121, 168, 0.1);
            color: var(--accent);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Additional Stats */
        .additional-stats {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-row-label {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-row-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .win-rate {
            color: var(--success);
        }

        /* Matches Section */
        .matches-section {
            padding: 20px;
            padding-bottom: 100px;
        }

        .matches-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .matches-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .view-all {
            color: var(--primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .view-all:hover {
            color: var(--primary-dark);
        }

        /* Match Card */
        .match-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .match-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .match-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .match-card.won {
            border-left: 4px solid var(--success);
        }

        .match-card.lost {
            border-left: 4px solid var(--danger);
        }

        .match-date {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .match-players {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .player-avatar.rival {
            background: var(--secondary);
        }

        .player-name-match {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .vs {
            color: var(--text-secondary);
            font-weight: 600;
            padding: 0 15px;
        }

        .match-score {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .score-set {
            background: var(--background);
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .score-set.winner {
            background: var(--primary);
            color: white;
        }

        .match-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .result-badge.win {
            background: rgba(0, 184, 148, 0.1);
            color: var(--success);
        }

        .result-badge.loss {
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger);
        }

        .match-location {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 12px;
        }

        .nav-item:hover {
            color: var(--primary);
            background: rgba(0, 212, 170, 0.05);
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-icon {
            font-size: 20px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 500;
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 90px;
            right: calc(50% - 220px);
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 99;
        }

        .fab:hover {
            background: var(--primary-dark);
            transform: scale(1.1);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.5s ease forwards;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        /* Responsive */
        @media (max-width: 480px) {
            .app-container {
                max-width: 100%;
            }
            
            .fab {
                right: 20px;
            }
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--secondary);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <button class="back-btn" onclick="goBack()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 class="header-title">Perfil de Jugador</h1>
                <button class="menu-btn" onclick="showMenu()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="1"/>
                        <circle cx="12" cy="5" r="1"/>
                        <circle cx="12" cy="19" r="1"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Profile Section -->
        <section class="profile-section animate-in">
            <div class="profile-image-container">
                <img src="https://image.qwenlm.ai/public_source/3019b707-47c5-4a40-8865-1b2dea189881/1f8d76d59-4841-470b-b807-5ec036f4b0c4.png" alt="Foto de jugador" class="profile-image">
            </div>
            <h2 class="player-name">Carlos Mendoza</h2>
            <span class="player-level">Nivel 7.5</span>
            <p class="player-ranking">🏆 Ranking #24</p>
        </section>

        <!-- Stats Section -->
        <section class="stats-section animate-in delay-1">
            <h3 class="stats-title">Estadísticas</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon winners">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                    </div>
                    <div class="stat-value" id="tirosGanadores">156</div>
                    <div class="stat-label">Tiros Ganadores</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon errors">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="15" y1="9" x2="9" y2="15"/>
                            <line x1="9" y1="9" x2="15" y2="15"/>
                        </svg>
                    </div>
                    <div class="stat-value" id="erroresNoForzados">42</div>
                    <div class="stat-label">Errores No Forzados</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon mvp">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                    </div>
                    <div class="stat-value" id="mvps">8</div>
                    <div class="stat-label">MVPs</div>
                </div>
            </div>

            <div class="additional-stats">
                <div class="stat-row">
                    <span class="stat-row-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        Partidos Jugados
                    </span>
                    <span class="stat-row-value" id="partidosJugados">45</span>
                </div>
                <div class="stat-row">
                    <span class="stat-row-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        Partidos Ganados
                    </span>
                    <span class="stat-row-value" id="partidosGanados">32</span>
                </div>
                <div class="stat-row">
                    <span class="stat-row-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                        Win Rate
                    </span>
                    <span class="stat-row-value win-rate" id="winRate">71.1%</span>
                </div>
                <div class="stat-row">
                    <span class="stat-row-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="1" x2="12" y2="23"/>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                        </svg>
                        Ratio Tiros/Errores
                    </span>
                    <span class="stat-row-value" id="ratio">3.71</span>
                </div>
            </div>
        </section>

        <!-- Matches Section -->
        <section class="matches-section animate-in delay-2">
            <div class="matches-header">
                <h3 class="matches-title">Historial de Partidos</h3>
                <span class="view-all" onclick="viewAllMatches()">Ver todos</span>
            </div>
            <div class="match-list" id="matchList">
                <!-- Matches will be loaded here -->
            </div>
        </section>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item" onclick="navigateTo('home')">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Inicio</span>
            </div>
            <div class="nav-item" onclick="navigateTo('matches')">
                <span class="nav-icon">🎾</span>
                <span class="nav-label">Partidos</span>
            </div>
            <div class="nav-item active" onclick="navigateTo('profile')">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Perfil</span>
            </div>
            <div class="nav-item" onclick="navigateTo('stats')">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Stats</span>
            </div>
        </nav>

        <!-- Floating Action Button -->
        <div class="fab" onclick="createNewMatch()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
        </div>

        <!-- Toast Notification -->
        <div class="toast" id="toast">Acción completada</div>
    </div>

    <script>
        // Sample Data - Simulating Firestore Data
        const playerData = {
            id: 'player_001',
            nombre: 'Carlos Mendoza',
            nivel: 7.5,
            ranking: 24,
            partidosJugados: 45,
            partidosGanados: 32,
            tirosGanadores: 156,
            erroresNoForzados: 42,
            mvps: 8,
            foto: 'https://image.qwenlm.ai/public_source/3019b707-47c5-4a40-8865-1b2dea189881/1f8d76d59-4841-470b-b807-5ec036f4b0c4.png'
        };

        const matchesData = [
            {
                id: 'match_001',
                fecha: '2024-01-15',
                rival: 'Miguel Torres',
                resultado: '6-4, 6-3',
                setsJugador: [6, 6],
                setsRival: [4, 3],
                ganador: true,
                pista: 'Pista Central',
                torneo: 'Torneo Club'
            },
            {
                id: 'match_002',
                fecha: '2024-01-12',
                rival: 'Juan Pérez',
                resultado: '4-6, 6-7',
                setsJugador: [4, 6],
                setsRival: [6, 7],
                ganador: false,
                pista: 'Pista 3',
                torneo: 'Amistoso'
            },
            {
                id: 'match_003',
                fecha: '2024-01-08',
                rival: 'David García',
                resultado: '6-2, 6-4',
                setsJugador: [6, 6],
                setsRival: [2, 4],
                ganador: true,
                pista: 'Pista 1',
                torneo: 'Liga Local'
            },
            {
                id: 'match_004',
                fecha: '2024-01-05',
                rival: 'Roberto Sánchez',
                resultado: '7-6, 6-4',
                setsJugador: [7, 6],
                setsRival: [6, 4],
                ganador: true,
                pista: 'Pista Central',
                torneo: 'Torneo Club'
            },
            {
                id: 'match_005',
                fecha: '2024-01-02',
                rival: 'Andrés López',
                resultado: '6-3, 3-6, 6-4',
                setsJugador: [6, 3, 6],
                setsRival: [3, 6, 4],
                ganador: true,
                pista: 'Pista 2',
                torneo: 'Amistoso'
            }
        ];

        // Initialize App
        document.addEventListener('DOMContentLoaded', function() {
            loadPlayerStats();
            loadMatches();
        });

        // Load Player Statistics
        function loadPlayerStats() {
            document.getElementById('tirosGanadores').textContent = playerData.tirosGanadores;
            document.getElementById('erroresNoForzados').textContent = playerData.erroresNoForzados;
            document.getElementById('mvps').textContent = playerData.mvps;
            document.getElementById('partidosJugados').textContent = playerData.partidosJugados;
            document.getElementById('partidosGanados').textContent = playerData.partidosGanados;
            
            const winRate = ((playerData.partidosGanados / playerData.partidosJugados) * 100).toFixed(1);
            document.getElementById('winRate').textContent = winRate + '%';
            
            const ratio = (playerData.tirosGanadores / playerData.erroresNoForzados).toFixed(2);
            document.getElementById('ratio').textContent = ratio;
        }

        // Load Matches List
        function loadMatches() {
            const matchList = document.getElementById('matchList');
            matchList.innerHTML = '';

            matchesData.forEach((match, index) => {
                const matchCard = createMatchCard(match, index);
                matchList.appendChild(matchCard);
            });
        }

        // Create Match Card
        function createMatchCard(match, index) {
            const card = document.createElement('div');
            card.className = `match-card ${match.ganador ? 'won' : 'lost'} animate-in`;
            card.style.animationDelay = `${0.3 + (index * 0.1)}s`;
            card.onclick = () => viewMatchDetails(match);

            const date = new Date(match.fecha);
            const formattedDate = date.toLocaleDateString('es-ES', { 
                day: 'numeric', 
                month: 'short', 
                year: 'numeric' 
            });

            const playerInitial = playerData.nombre.charAt(0);
            const rivalInitial = match.rival.charAt(0);

            card.innerHTML = `
                <div class="match-date">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    ${formattedDate}
                </div>
                <div class="match-players">
                    <div class="player-info">
                        <div class="player-avatar">${playerInitial}</div>
                        <span class="player-name-match">${playerData.nombre.split(' ')[0]}</span>
                    </div>
                    <span class="vs">vs</span>
                    <div class="player-info" style="justify-content: flex-end;">
                        <span class="player-name-match">${match.rival.split(' ')[0]}</span>
                        <div class="player-avatar rival">${rivalInitial}</div>
                    </div>
                </div>
                <div class="match-score">
                    ${match.setsJugador.map((set, i) => `
                        <div class="score-set ${match.ganador ? 'winner' : ''}">${set}</div>
                    `).join('')}
                </div>
                <div class="match-result">
                    <span class="result-badge ${match.ganador ? 'win' : 'loss'}">
                        ${match.ganador ? '✓ Victoria' : '✗ Derrota'}
                    </span>
                    <span class="match-location">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                        ${match.pista}
                    </span>
                </div>
            `;

            return card;
        }

        // Navigation Functions
        function goBack() {
            showToast('Volviendo al inicio...');
            setTimeout(() => {
                navigateTo('home');
            }, 500);
        }

        function showMenu() {
            showToast('Menú de opciones');
        }

        function navigateTo(page) {
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            showToast(`Navegando a ${page}...`);
        }

        function viewAllMatches() {
            showToast('Cargando todos los partidos...');
        }

        function viewMatchDetails(match) {
            showToast(`Partido vs ${match.rival}`);
        }

        function createNewMatch() {
            showToast('Creando nuevo partido...');
        }

        // Toast Notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Simulate Data Refresh
        function refreshData() {
            document.querySelectorAll('.animate-in').forEach(el => {
                el.style.animation = 'none';
                el.offsetHeight;
                el.style.animation = null;
            });
            showToast('Datos actualizados');
        }

        // Pull to refresh simulation
        let touchStartY = 0;
        let touchEndY = 0;

        document.addEventListener('touchstart', e => {
            touchStartY = e.changedTouches[0].screenY;
        });

        document.addEventListener('touchend', e => {
            touchEndY = e.changedTouches[0].screenY;
            if (touchEndY - touchStartY > 100) {
                refreshData();
            }
        });
    </script>
</body>
</html>
